<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>チズノート</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            terracotta: '#E07A5F',
            sage: '#81B29A',
            bluegrey: '#3D405B',
            cream: '#F4F1DE',
            mustard: '#F2CC8F',
          },
          fontFamily: {
            rounded: ['"M PLUS Rounded 1c"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- D3.js (SVG地図描画とアニメーション用) -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      height: 100dvh; 
      width: 100vw;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    
    #root {
      height: 100%;
      width: 100%;
    }

    /* コルクボード風背景 */
    .bg-cork {
      background-color: #d0a57b;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
    }

    /* 紙の質感背景 */
    .bg-paper {
      background-color: #F4F1DE;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }

    /* マスキングテープ装飾 */
    .masking-tape {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 100px;
      height: 30px;
      background-color: rgba(129, 178, 154, 0.6);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      z-index: 10;
      border-left: 2px dotted rgba(255,255,255,0.6);
      border-right: 2px dotted rgba(255,255,255,0.6);
    }
    .masking-tape-terracotta { background-color: rgba(224, 122, 95, 0.6); transform: translateX(-50%) rotate(3deg); }
    .masking-tape-mustard { background-color: rgba(242, 204, 143, 0.6); transform: translateX(-50%) rotate(-1deg); }

    /* 画鋲（ピン）装飾 */
    .pin {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fca5a5, #E07A5F);
      box-shadow: 2px 3px 4px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(0,0,0,0.2);
      z-index: 10;
    }
    .pin::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background-color: rgba(255,255,255,0.6);
    }
    .pin-blue { background: radial-gradient(circle at 30% 30%, #93c5fd, #3D405B); }
    .pin-yellow { background: radial-gradient(circle at 30% 30%, #fde047, #F2CC8F); }

    @keyframes openNote {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .animate-open-note { animation: openNote 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

    @keyframes popIn {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  </style>
</head>
<body>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- アプリのデータ定義 ---
    const PREFECTURES = [

      { id: 16, name: '富山県', kana: 'とやまけん', region: '中部', x: 11, y: 7, w: 1, h: 1 },
      { id: 17, name: '石川県', kana: 'いしかわけん', region: '中部', x: 10, y: 6, w: 1, h: 2 },

      { id: 19, name: '山梨県', kana: 'やまなしけん', region: '中部', x: 12, y: 10, w: 1, h: 1 },

      { id: 27, name: '大阪府', kana: 'おおさかふ', region: '近畿', x: 9, y: 10, w: 1, h: 1 },

      { id: 32, name: '島根県', kana: 'しまねけん', region: '中国・四国', x: 6, y: 9, w: 1, h: 1 },
      { id: 33, name: '岡山県', kana: 'おかやまけん', region: '中国・四国', x: 7, y: 10, w: 1, h: 1 },
      { id: 34, name: '広島県', kana: 'ひろしまけん', region: '中国・四国', x: 6, y: 10, w: 1, h: 1 },
      { id: 35, name: '山口県', kana: 'やまぐちけん', region: '中国・四国', x: 5, y: 9, w: 1, h: 2 },
      { id: 36, name: '徳島県', kana: 'とくしまけん', region: '中国・四国', x: 8, y: 12, w: 1, h: 1 },
      { id: 37, name: '香川県', kana: 'かがわけん', region: '中国・四国', x: 7, y: 12, w: 1, h: 1 },
      { id: 38, name: '愛媛県', kana: 'えひめけん', region: '中国・四国', x: 6, y: 12, w: 1, h: 1 },
      { id: 39, name: '高知県', kana: 'こうちけん', region: '中国・四国', x: 7, y: 13, w: 1, h: 1 },
      { id: 40, name: '福岡県', kana: 'ふくおかけん', region: '九州・沖縄', x: 4, y: 10, w: 1, h: 1 },
      { id: 41, name: '佐賀県', kana: 'さがけん', region: '九州・沖縄', x: 3, y: 10, w: 1, h: 1 },
      { id: 42, name: '長崎県', kana: 'ながさきけん', region: '九州・沖縄', x: 2, y: 10, w: 1, h: 1 },
      { id: 43, name: '熊本県', kana: 'くまもとけん', region: '九州・沖縄', x: 3, y: 11, w: 1, h: 1 },
      { id: 44, name: '大分県', kana: 'おおいたけん', region: '九州・沖縄', x: 4, y: 11, w: 1, h: 1 },
      { id: 45, name: '宮崎県', kana: 'みやざきけん', region: '九州・沖縄', x: 4, y: 12, w: 1, h: 1 },
      { id: 46, name: '鹿児島県', kana: 'かごしまけん', region: '九州・沖縄', x: 3, y: 12, w: 1, h: 1 },
      { id: 47, name: '沖縄県', kana: 'おきなわけん', region: '九州・沖縄', x: 1, y: 15, w: 1, h: 1 },
    ];

    const REGION_LIST = ['北海道・東北', '関東', '中部', '近畿', '中国・四国', '九州・沖縄'];

    // --- ノート風のボタン（地方選択用） ---
    const RegionNote = ({ region, onClick, isSelected }) => {
      return (
        <div 
          onClick={onClick}
          className={`bg-white w-full h-24 sm:h-28 rounded-sm flex flex-col items-center justify-center relative cursor-pointer transition-all p-3
            ${isSelected 
              ? 'border-4 border-terracotta transform -translate-y-1 shadow-lg ring-2 ring-terracotta/30' 
              : 'border border-gray-100 shadow-md hover:-translate-y-1 hover:shadow-lg'}`}
        >
          {isSelected && (
            <div className="absolute -top-3 -right-3 w-7 h-7 sm:w-8 sm:h-8 bg-terracotta text-white rounded-full flex items-center justify-center font-bold text-lg sm:text-xl shadow-md border-2 border-white z-20">
              ✓
            </div>
          )}
          <span className="font-rounded text-bluegrey font-bold text-center text-lg sm:text-xl mt-2">
            {region}
          </span>
        </div>
      );
    };

    // --- アニメーション機能付き日本地図コンポーネント ---
    const RealMapGrid = ({ currentPrefId }) => {
      const [geoData, setGeoData] = useState(null);
      const [hasError, setHasError] = useState(false);
      const gRef = useRef(null);

      useEffect(() => {
        const cachedMap = localStorage.getItem('gogo_drill_japan_geojson');
        if (cachedMap) {
          try {
            setGeoData(JSON.parse(cachedMap));
            return;
          } catch (e) {
            console.error("Cache read error");
          }
        }

        const fetchMap = async () => {
          try {
            const res = await fetch('https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson');
            if (!res.ok) throw new Error('Network error');
            const data = await res.json();
            
            try {
              localStorage.setItem('gogo_drill_japan_geojson', JSON.stringify(data));
            } catch(e) {}
            
            setGeoData(data);
          } catch (error) {
            console.error("Map fetch error:", error);
            setHasError(true);
          }
        };

        fetchMap();
      }, []);

      useEffect(() => {
        if (!geoData || !currentPrefId || !gRef.current) return;

        const g = d3.select(gRef.current);
        const width = 800;
        const height = 800;
        const projection = d3.geoMercator().fitSize([width - 10, height - 10], geoData);
        const pathGenerator = d3.geoPath().projection(projection);

        let targetFeature = null;
        geoData.features.forEach(feature => {
          const props = feature.properties;
          const nameStr = props.nam_ja || props.name_ja || props.name_local || props.name || props.nam || "";
          
          let prefId = null;
          if (props.id) prefId = parseInt(props.id, 10);
          
          // --- 修正箇所: 都道府県の完全一致判定（京都と東京の混同を防止） ---
          const pref = PREFECTURES.find(p => {
            if (prefId !== null && p.id === prefId) return true;
            if (!nameStr) return false;
            const cleanGeoName = nameStr.replace(/(都|道|府|県)$/, '');
            const cleanPrefName = p.name.replace(/(都|道|府|県)$/, '');
            return cleanGeoName === cleanPrefName;
          });

          if (pref && pref.id === currentPrefId) {
            targetFeature = feature;
          }
        });

        if (targetFeature) {
          g.interrupt().attr("transform", "translate(5, 5) scale(1)");

          const bounds = pathGenerator.bounds(targetFeature);
          const dx = bounds[1][0] - bounds[0][0];
          const dy = bounds[1][1] - bounds[0][1];
          const x = (bounds[0][0] + bounds[1][0]) / 2;
          const y = (bounds[0][1] + bounds[1][1]) / 2;

          const scale = Math.max(1, Math.min(3.5, 0.6 / Math.max(dx / width, dy / height)));
          const translate = [width / 2 - scale * x, height / 2 - scale * y];

          g.transition()
            .delay(600)    
            .duration(1500) 
            .ease(d3.easeCubicInOut)
            .attr("transform", `translate(${translate[0]},${translate[1]}) scale(${scale})`);
        }
      }, [currentPrefId, geoData]);

      if (hasError) {
        return (
          <div className="w-full aspect-square bg-[#eaf4f4] rounded-xl p-2 grid border-4 border-white shadow-inner relative mx-auto shrink-0" 
               style={{ maxWidth: 'min(100%, 55vh)', gridTemplateColumns: 'repeat(16, minmax(0, 1fr))', gridTemplateRows: 'repeat(16, minmax(0, 1fr))', gap: '2px' }}>
            {PREFECTURES.map(pref => {
              const isTarget = pref.id === currentPrefId;
              return (
                <div 
                  key={pref.id}
                  className={`rounded-sm transition-all duration-300 ${
                    isTarget ? 'bg-terracotta animate-pulse scale-[1.15] z-10 shadow-md border border-white' : 'bg-sage opacity-80 border border-sage/50'
                  }`}
                  style={{ gridColumnStart: pref.x, gridRowStart: pref.y, gridColumnEnd: pref.x + pref.w, gridRowEnd: pref.y + pref.h }}
                ></div>
              );
            })}
          </div>
        );
      }

      if (!geoData) {
        return (
          <div className="w-full aspect-square bg-[#eaf4f4] rounded-xl border-4 border-white shadow-inner mx-auto flex flex-col items-center justify-center shrink-0" style={{ maxWidth: 'min(100%, 55vh)' }}>
            <div className="w-12 h-12 border-4 border-sage border-t-transparent rounded-full animate-spin mb-4"></div>
            <p className="font-rounded font-bold text-sage text-lg">ちずを じゅんび中...</p>
          </div>
        );
      }

      const width = 800;
      const height = 800;
      const projection = d3.geoMercator().fitSize([width - 10, height - 10], geoData);
      const pathGenerator = d3.geoPath().projection(projection);

      return (
        <div 
          className="w-full aspect-square bg-[#eaf4f4] rounded-xl border-4 border-white shadow-inner relative mx-auto overflow-hidden flex items-center justify-center shrink-0"
          style={{ maxWidth: 'min(100%, 55vh)' }}
        >
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
            <text x="650" y="720" fill="rgba(147, 197, 253, 0.5)" fontSize="60" fontWeight="bold">~</text>
            <text x="60" y="150" fill="rgba(147, 197, 253, 0.5)" fontSize="50" fontWeight="bold">~</text>

            <g ref={gRef}>
              {geoData.features.map((feature, i) => {
                const props = feature.properties;
                const nameStr = props.nam_ja || props.name_ja || props.name_local || props.name || props.nam || "";
                
                let prefId = null;
                if (props.id) prefId = parseInt(props.id, 10);
                
                // --- 修正箇所: 都道府県の完全一致判定 ---
                const pref = PREFECTURES.find(p => {
                  if (prefId !== null && p.id === prefId) return true;
                  if (!nameStr) return false;
                  const cleanGeoName = nameStr.replace(/(都|道|府|県)$/, '');
                  const cleanPrefName = p.name.replace(/(都|道|府|県)$/, '');
                  return cleanGeoName === cleanPrefName;
                });

                const isTarget = pref && pref.id === currentPrefId;
                
                return (
                  <path
                    key={`pref-${i}`}
                    d={pathGenerator(feature)}
                    fill={isTarget ? '#E07A5F' : '#81B29A'}
                    stroke="#ffffff"
                    strokeWidth="2" 
                    vectorEffect="non-scaling-stroke" 
                    className={`transition-colors duration-300 ${isTarget ? "animate-pulse" : "opacity-80"}`}
                  />
                );
              })}
            </g>
          </svg>
        </div>
      );
    };

    // --- メインアプリケーション ---
    const App = () => {
      const [gameState, setGameState] = useState('TITLE'); 
      const [selectedRegions, setSelectedRegions] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null); 
      const [options, setOptions] = useState([]);
      const [hasMistaked, setHasMistaked] = useState(false);

      const addScoreToLocal = () => {
        const currentScore = parseInt(localStorage.getItem('gogo_drill_score') || '0', 10);
        localStorage.setItem('gogo_drill_score', currentScore + 1);
      };

      const toggleRegion = (region) => {
        setSelectedRegions(prev => 
          prev.includes(region) 
            ? prev.filter(r => r !== region) 
            : [...prev, region]
        );
      };

      const startGame = () => {
        if (selectedRegions.length === 0) {
          alert('ちほうを 1つ以上 えらんでね！');
          return;
        }

        let targetPrefs = PREFECTURES.filter(p => selectedRegions.includes(p.region));
        targetPrefs = targetPrefs.sort(() => 0.5 - Math.random());

        setQuestions(targetPrefs);
        setCurrentIndex(0);
        setScore(0);
        setHasMistaked(false);
        setFeedback(null);
        setGameState('QUIZ');
      };

      useEffect(() => {
        if (gameState === 'QUIZ' && questions.length > 0) {
          const currentPref = questions[currentIndex];
          
          const sameRegion = PREFECTURES.filter(p => p.region === currentPref.region && p.id !== currentPref.id);
          const others = PREFECTURES.filter(p => p.region !== currentPref.region);
          
          let newOptions = sameRegion.sort(() => 0.5 - Math.random()).slice(0, 3);
          
          if (newOptions.length < 3) {
            const extra = others.sort(() => 0.5 - Math.random()).slice(0, 3 - newOptions.length);
            newOptions = [...newOptions, ...extra];
          }
          
          newOptions.push(currentPref);
          setOptions(newOptions.sort(() => 0.5 - Math.random()));
        }
      }, [gameState, currentIndex, questions]);

      const handleAnswer = (opt) => {
        if (feedback !== null) return; 

        const isCorrect = opt.id === questions[currentIndex].id;

        if (isCorrect) {
          setFeedback('⭕️');
          if (!hasMistaked) {
            setScore(s => s + 1);
            addScoreToLocal(); 
          }
          
          setTimeout(() => {
            if (currentIndex + 1 < questions.length) {
              setCurrentIndex(i => i + 1);
              setHasMistaked(false);
              setFeedback(null);
            } else {
              setGameState('RESULT');
              setFeedback(null);
            }
          }, 1200);

        } else {
          setFeedback('❌');
          setHasMistaked(true);
          
          setTimeout(() => {
            setFeedback(null);
          }, 1200);
        }
      };

      const backToPortal = () => {
        window.location.href = 'https://hot-spring-egg.github.io/ontama-drill/';
      };

      return (
        <div className="w-full h-full flex flex-col items-center justify-center relative overflow-hidden bg-cork">
          
          {(gameState === 'TITLE' || gameState === 'SELECT') && (
            <button 
              onClick={backToPortal}
              className="absolute top-4 left-4 sm:top-6 sm:left-6 bg-white/90 text-bluegrey px-4 py-2 rounded-full font-bold shadow-sm hover:shadow-md transition-all z-40 border border-gray-200 text-sm sm:text-base"
            >
              ← ドリルにもどる
            </button>
          )}

          {gameState === 'TITLE' && (
            <div className="w-full max-w-md mx-auto flex flex-col items-center justify-center p-4">
              <div className="bg-paper px-8 py-6 rounded-sm shadow-md mb-12 transform -rotate-2 relative border border-white">
                <div className="pin pin-yellow"></div>
                <h1 className="font-rounded text-4xl sm:text-5xl font-bold text-bluegrey tracking-widest text-center mt-2">
                  チズノート
                </h1>
                <p className="text-center text-sage font-bold mt-2 text-sm sm:text-base">
                  都道府県クイズ
                </p>
              </div>
              
              <button 
                onClick={() => setGameState('SELECT')}
                className="w-full bg-terracotta text-white font-rounded py-4 rounded-full shadow-lg active:translate-y-1 active:shadow-md text-2xl font-bold transition-all border-4 border-white"
              >
                はじめる
              </button>
            </div>
          )}

          {gameState === 'SELECT' && (
            <div className="w-full h-full flex flex-col items-center relative py-6">
              <div className="w-full max-w-4xl mx-auto flex flex-col items-center mb-4 bg-paper/90 p-4 rounded-lg shadow-sm border border-white">
                <h2 className="font-rounded text-xl sm:text-2xl font-bold text-bluegrey">
                  どの ちほう に チャレンジする？
                </h2>
                <p className="text-sm text-gray-500 mt-1">（いくつでも えらべるよ）</p>
              </div>

              <div className="w-full max-w-3xl flex justify-end gap-4 px-4 mb-2">
                <button onClick={() => setSelectedRegions([...REGION_LIST])} className="font-rounded text-sm font-bold text-sage underline">全部えらぶ</button>
                <button onClick={() => setSelectedRegions([])} className="font-rounded text-sm font-bold text-terracotta underline">全部けす</button>
              </div>

              <div className="w-full flex-1 overflow-y-auto px-4 pb-32">
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 w-full max-w-3xl mx-auto">
                  {REGION_LIST.map((region, index) => (
                    <RegionNote 
                      key={region}
                      region={region}
                      isSelected={selectedRegions.includes(region)}
                      onClick={() => toggleRegion(region)}
                    />
                  ))}
                </div>
              </div>

              {selectedRegions.length > 0 && (
                <div className="absolute bottom-6 w-full flex justify-center animate-open-note z-10 px-4 pointer-events-none">
                  <button 
                    onClick={startGame}
                    className="bg-sage text-white font-rounded py-3 sm:py-4 px-10 rounded-full shadow-lg active:translate-y-1 active:shadow-md text-xl font-bold transition-all border-4 border-white w-full max-w-sm pointer-events-auto"
                  >
                    クイズを スタート！
                  </button>
                </div>
              )}
            </div>
          )}

          {gameState === 'QUIZ' && questions.length > 0 && (
            <div className="w-full h-full flex flex-col p-2 sm:p-4 relative">
              <div className="w-full max-w-3xl mx-auto flex-1 flex flex-col items-center bg-paper rounded-sm shadow-xl p-2 sm:p-4 overflow-hidden relative animate-open-note border border-white">
                
                <div className="w-full flex justify-between items-center font-rounded text-sm sm:text-base text-bluegrey/70 mb-2 px-2">
                  <button 
                    onClick={() => setGameState('SELECT')} 
                    className="underline hover:text-bluegrey"
                    disabled={feedback !== null}
                  >
                    ← やめる
                  </button>
                  <div className="flex gap-3 font-bold">
                    <span className="bg-white px-3 py-1 rounded-full shadow-sm">
                      {currentIndex + 1} / {questions.length} 問
                    </span>
                    <span className="bg-white px-3 py-1 rounded-full shadow-sm text-terracotta">
                      スコア: {score}
                    </span>
                  </div>
                </div>

                <RealMapGrid currentPrefId={questions[currentIndex].id} />

                <div className="text-center my-2 shrink-0 z-10">
                  <p className="text-base sm:text-lg font-bold text-bluegrey bg-white/80 backdrop-blur-sm px-4 py-1 rounded-full shadow-sm border border-gray-100">
                    あかく ひかっている ところは どこかな？
                  </p>
                </div>

                <div className="grid grid-cols-2 gap-2 w-full max-w-md mt-auto pb-2 px-2 z-10">
                  {options.map(opt => (
                    <button 
                      key={opt.id}
                      onClick={() => handleAnswer(opt)}
                      disabled={feedback !== null}
                      className="bg-white border-b-4 border-sage text-bluegrey font-rounded py-2 sm:py-3 rounded-lg shadow-md hover:bg-sage/10 active:translate-y-1 active:border-b-0 transition-all font-bold flex flex-col items-center justify-center"
                    >
                      <span className="text-[10px] sm:text-xs text-gray-500 font-normal mb-0.5">{opt.kana}</span>
                      <span className="text-lg sm:text-xl leading-none">{opt.name}</span>
                    </button>
                  ))}
                </div>

                {feedback && (
                  <div className="absolute inset-0 flex items-center justify-center z-50 pointer-events-none bg-white/30 backdrop-blur-sm">
                    <span className={`text-[12rem] drop-shadow-xl font-bold ${feedback === '⭕️' ? 'text-sage' : 'text-terracotta'} animate-pop-in`}>
                      {feedback}
                    </span>
                  </div>
                )}

              </div>
            </div>
          )}

          {gameState === 'RESULT' && (
            <div className="w-full h-full flex flex-col p-4 sm:p-8 relative">
              <div className="w-full max-w-xl mx-auto flex-1 flex flex-col items-center justify-center bg-paper rounded-sm shadow-xl p-6 relative animate-open-note border border-white">
                <h2 className="font-rounded text-3xl sm:text-4xl font-bold mb-6 text-bluegrey border-b-2 border-sage pb-2">
                  けっか はっぴょう
                </h2>
                
                <p className="text-[6rem] sm:text-[8rem] font-bold text-terracotta mb-4 leading-none drop-shadow-sm">
                  {score} <span className="text-2xl sm:text-4xl text-bluegrey">てん</span>
                </p>
                
                <p className="font-rounded text-lg sm:text-xl mb-12 text-sage font-bold bg-white px-6 py-2 rounded-full shadow-sm">
                  {score === questions.length ? 'パーフェクト！ すごいぞ！' : 'よく がんばったね！'}
                </p>
                
                <div className="flex flex-col sm:flex-row gap-4 w-full">
                  <button 
                    onClick={() => setGameState('SELECT')}
                    className="flex-1 bg-sage text-white font-rounded py-4 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-xl font-bold transition-all"
                  >
                    ちほうを えらぶ
                  </button>
                  <button 
                    onClick={backToPortal}
                    className="flex-1 bg-bluegrey text-white font-rounded py-4 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-xl font-bold transition-all"
                  >
                    ドリルに もどる
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
